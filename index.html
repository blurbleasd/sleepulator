<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SLEEPULATOR</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sleepulator" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="config.js"></script>

  <!-- Lucide icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.577.0/dist/umd/lucide.min.js"></script>

  <style>
    :root {
      --c-bg:       #030712;
      --c-surface:  #0f172a;
      --c-border:   #1e293b;
      --c-border2:  #334155;
      --c-text:     #e2e8f0;
      --c-muted:    #94a3b8;
      --c-dim:      #475569;
      --c-indigo:   #818cf8;
      --c-orange:   #fb923c;
      --c-blue:     #60a5fa;
      --c-purple:   #c084fc;
      --c-teal:     #2dd4bf;
      --c-red:      #f87171;
      --safe-top:   env(safe-area-inset-top, 0px);
      --safe-bot:   env(safe-area-inset-bottom, 0px);
      --top-clearance: max(2.5rem, calc(var(--safe-top) + 1rem));
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { height: 100%; overscroll-behavior: none; margin: 0; }
    body { background: var(--c-bg); color: var(--c-text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── Layout helpers ── */
    #root { min-height: 100dvh; }
    .pad-top    { padding-top:    var(--top-clearance); }
    .pad-bottom { padding-bottom: max(5rem,   var(--safe-bot)); }

    /* ── Cards ── */
    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 1.25rem;
      padding: 1.25rem;
    }
    .card-inner {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: .875rem;
      padding: 1rem;
    }

    /* ── Buttons ── */
    .btn-icon {
      min-width: 44px; min-height: 44px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; transition: background .15s, color .15s;
      background: #1e293b; color: var(--c-muted);
    }
    .btn-icon:active { opacity: .7; }
    .btn-icon.active-orange { background: rgba(251,146,60,.15); color: var(--c-orange); }
    .btn-icon.active-blue   { background: rgba(96,165,250,.15); color: var(--c-blue); }
    .btn-icon.active-purple { background: rgba(192,132,252,.15); color: var(--c-purple); }
    .btn-icon.active-indigo { background: rgba(129,140,248,.15); color: var(--c-indigo); }

    .btn-pill {
      display: inline-flex; align-items: center; gap: .375rem;
      padding: .5rem .875rem; border-radius: 9999px;
      font-size: .75rem; font-weight: 700; cursor: pointer;
      border: 1px solid; transition: all .15s;
    }
    .btn-primary {
      width: 100%; padding: .875rem; border-radius: .875rem;
      font-size: .9rem; font-weight: 700; cursor: pointer;
      border: none; transition: all .15s;
    }
    .btn-primary:active { opacity: .85; }

    /* ── Toggle switch ── */
    .toggle {
      width: 52px; height: 30px; min-width: 52px; min-height: 30px;
      border-radius: 9999px; border: none; cursor: pointer;
      position: relative; transition: background .2s;
      background: #1e293b;
    }
    .toggle.on { background: var(--c-purple); }
    .toggle-knob {
      width: 22px; height: 22px; border-radius: 50%; background: #fff;
      position: absolute; top: 4px; left: 4px;
      transition: transform .2s; pointer-events: none;
    }
    .toggle.on .toggle-knob { transform: translateX(22px); }

    /* ── Range inputs ── */
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px; border-radius: 3px;
      background: var(--c-border2); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: currentColor; border: none; cursor: pointer;
    }
    input[type=range].orange { color: var(--c-orange); }
    input[type=range].blue   { color: var(--c-blue); }
    input[type=range].purple { color: var(--c-purple); }
    input[type=range].indigo { color: var(--c-indigo); }
    input[type=range].muted  { color: var(--c-dim); }

    /* ── Inputs / selects ── */
    input[type=text], input[type=url], select, textarea {
      font-size: 16px !important; /* prevent iOS zoom */
      background: var(--c-bg); color: var(--c-text);
      border: 1px solid var(--c-border2); border-radius: .625rem;
      padding: .5rem .75rem; outline: none; width: 100%;
      -webkit-appearance: none; appearance: none;
    }
    input[type=text]:focus, input[type=url]:focus, select:focus { border-color: var(--c-indigo); }
    select { padding-right: 1.5rem; }

    /* ── Scrollbar ── */
    .scroll-y { overflow-y: auto; }
    .scroll-y::-webkit-scrollbar { width: 3px; }
    .scroll-y::-webkit-scrollbar-track { background: transparent; }
    .scroll-y::-webkit-scrollbar-thumb { background: var(--c-border2); border-radius: 3px; }

    /* ── Glow pulse on active card edge ── */
    @keyframes glowOrange { 0%,100%{opacity:.4;box-shadow:0 0 6px rgba(251,146,60,.3)} 50%{opacity:1;box-shadow:0 0 18px rgba(251,146,60,.9)} }
    @keyframes glowBlue   { 0%,100%{opacity:.4;box-shadow:0 0 6px rgba(96,165,250,.3)} 50%{opacity:1;box-shadow:0 0 18px rgba(96,165,250,.9)} }
    @keyframes glowPurple { 0%,100%{opacity:.4;box-shadow:0 0 6px rgba(192,132,252,.3)} 50%{opacity:1;box-shadow:0 0 18px rgba(192,132,252,.9)} }
    .glow-orange { animation: glowOrange 3s ease-in-out infinite; }
    .glow-blue   { animation: glowBlue   3s ease-in-out infinite; }
    .glow-purple { animation: glowPurple 3s ease-in-out infinite; }

    /* ── Breathing circles ── */
    @keyframes breathe478 {
      0%   { transform: scale(.25); opacity: .2; }
      21%  { transform: scale(1);   opacity: .9; }
      58%  { transform: scale(1.05);opacity: 1;  }
      100% { transform: scale(.25); opacity: .2; }
    }
    @keyframes breatheBox {
      0%,100% { transform: scale(.25); opacity: .2; }
      25%     { transform: scale(1);   opacity: .9; }
      50%     { transform: scale(1.05);opacity: 1;  }
      75%     { transform: scale(.25); opacity: .2; }
    }
    .anim-478 { animation: breathe478 19s ease-in-out infinite; }
    .anim-box { animation: breatheBox 16s ease-in-out infinite; }

    /* ── Bedtime mode overrides ── */
    .bm body, .bm { background: #000 !important; }
    .bm .card     { background: #050505; border-color: #111; }
    .bm .card-inner { background: #020202; border-color: #111; }
    .bm input[type=text], .bm input[type=url], .bm select { background: #050505; border-color: #111; color: #9ca3af; }
    .bm .btn-icon  { background: #0a0a0a; color: #4b5563; }
    .bm .toggle    { background: #111; }
    .bm .toggle.on { background: #374151; }
    .bm .toggle-knob { background: #6b7280; }

    /* ── Floating mute button ── */
    #mute-btn {
      position: fixed; bottom: calc(1.5rem + var(--safe-bot));
      right: 1.25rem; z-index: 100;
      width: 56px; height: 56px; border-radius: 50%;
      background: #1e293b; border: 1px solid #334155;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.6);
      cursor: pointer; transition: all .15s;
    }
    #mute-btn:active { transform: scale(.92); }
    #mute-btn.muted  { background: rgba(248,113,113,.15); border-color: rgba(248,113,113,.4); }

    /* ── Offline banner ── */
    #offline-banner {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: #4f46e5; color: #fff; text-align: center;
      padding: 10px; font-size: 13px; z-index: 9999;
    }

    /* ── Chip tabs ── */
    .tab-bar { display: flex; gap: .375rem; padding: .25rem; background: var(--c-bg); border: 1px solid var(--c-border); border-radius: .875rem; }
    .tab-btn { flex: 1; padding: .5rem; border: none; border-radius: .625rem; cursor: pointer; font-size: .7rem; font-weight: 600; transition: all .15s; background: transparent; color: var(--c-dim); }
    .tab-btn.active { background: var(--c-surface); color: var(--c-text); }
    .tab-btn.active-purple { background: #581c87; color: var(--c-purple); }

    /* ── Episode row ── */
    .ep-row { display: flex; align-items: center; gap: .5rem; padding: .625rem .75rem; border-radius: .875rem; transition: background .1s; }
    .ep-row:active { opacity: .8; }

    /* ── Speed chips ── */
    .speed-chip { flex: 1; padding: .5rem; border-radius: .5rem; font-size: .7rem; font-weight: 600; border: 1px solid var(--c-border); background: transparent; color: var(--c-dim); cursor: pointer; transition: all .15s; }
    .speed-chip.on { background: #581c87; border-color: #7e22ce; color: var(--c-purple); }

    /* ── Section label ── */
    .section-label { font-size: .65rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--c-dim); margin-bottom: .5rem; }

    /* ── Overlay ── */
    .overlay { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; }
  </style>
</head>
<body>
<div id="root"></div>
<button id="mute-btn" title="Mute all" style="display:none">
  <!-- icon injected by JS -->
</button>
<div id="offline-banner">⚡ Offline — app &amp; audio still work</div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const APP_CONFIG = window.SLEEPULATOR_CONFIG || {};
const LEGACY_DEFAULT_FEED_URL = 'https://feeds.simplecast.com/tOaZvgCO';
const DEFAULT_FEED_PROXY_URL = 'https://sleepulator-feed-proxy.chesteraarfer.workers.dev';
const NATIVE_MEDIA_VOLUME_LOCK = !!APP_CONFIG.forceNativeMediaVolumeLock || isIOSDevice();
const LUCIDE_FALLBACK_GLYPHS = {
  BookMarked: '⌑',
  Clock: '◷',
  GripVertical: '⋮',
  Moon: '☾',
  MoonStar: '☾',
  Pause: '❚❚',
  Play: '▶',
  Plus: '+',
  RotateCcw: '↺',
  RotateCw: '↻',
  Rss: '◔',
  Search: '⌕',
  Settings2: '⚙',
  Shuffle: '⇄',
  SlidersHorizontal: '≡',
  Square: '■',
  Sun: '☼',
  Trash2: '⌫',
  Volume2: '🔊',
  VolumeX: '🔇',
  Wind: '≈',
  X: '×',
};

// ─── Lucide helper (works with the UMD build) ─────────────────────────────────
// The UMD lucide build exposes window.lucide as an object of { IconName: [[path,attrs],...] }
// We render SVGs directly from those path data.
function LucideIcon({ name, size = 20, color = 'currentColor', strokeWidth = 2, className = '', style = {} }) {
  const iconData = window.lucide?.[name];
  if (!iconData) {
    const fallback = LUCIDE_FALLBACK_GLYPHS[name] || '•';
    return (
      <span
        aria-hidden="true"
        style={{
          display:'inline-flex',
          alignItems:'center',
          justifyContent:'center',
          width:size,
          height:size,
          color,
          fontSize:Math.max(12, Math.round(size * 0.9)),
          lineHeight:1,
          ...style,
        }}
        className={className}
      >
        {fallback}
      </span>
    );
  }
  // iconData is [[tag, attrs], ...]
  const children = iconData || [];
  return (
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width={size} height={size} viewBox="0 0 24 24"
      fill="none" stroke={color} strokeWidth={strokeWidth}
      strokeLinecap="round" strokeLinejoin="round"
      className={className} style={style}
    >
      {children.map((child, i) => {
        const [tag, attrs] = child;
        if (tag === 'path')   return <path key={i} {...attrs} />;
        if (tag === 'circle') return <circle key={i} {...attrs} />;
        if (tag === 'rect')   return <rect key={i} {...attrs} />;
        if (tag === 'line')   return <line key={i} {...attrs} />;
        if (tag === 'polyline') return <polyline key={i} {...attrs} />;
        if (tag === 'polygon')  return <polygon key={i} {...attrs} />;
        return null;
      })}
    </svg>
  );
}

// ─── Stable episode ID from URL hash ─────────────────────────────────────────
function hashUrl(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return 'ep_' + Math.abs(h).toString(36);
}

const FEED_TIMEOUT_MS = 15000;
const FEED_ACCEPT_HEADER = 'application/rss+xml, application/atom+xml, application/xml, text/xml;q=0.9, text/plain;q=0.7, */*;q=0.1';

function clamp01(value) {
  return Math.max(0, Math.min(1, value));
}

function shortenSecret(value, keepStart = 5, keepEnd = 3) {
  if (!value) return '';
  if (value.length <= keepStart + keepEnd + 3) return value;
  return `${value.slice(0, keepStart)}...${value.slice(-keepEnd)}`;
}

function redactUrlForDisplay(value) {
  const trimmed = (value || '').trim();
  if (!trimmed) return '';
  try {
    const parsed = new URL(trimmed, window.location.href);
    if (parsed.username) parsed.username = shortenSecret(parsed.username, 2, 1);
    if (parsed.password) parsed.password = '***';
    parsed.searchParams.forEach((paramValue, key) => {
      if (/token|key|auth|sig|signature|secret|pass|password|expires/i.test(key)) {
        parsed.searchParams.set(key, shortenSecret(paramValue));
      }
    });
    return parsed.toString();
  } catch {
    return trimmed.length > 140 ? `${trimmed.slice(0, 137)}...` : trimmed;
  }
}

function normalizeConfigUrl(input) {
  const trimmed = (input || '').trim();
  if (!trimmed) return '';
  try { return new URL(trimmed, window.location.href).href; }
  catch { return trimmed; }
}

function getDefaultFeedProxyUrl() {
  return normalizeConfigUrl(APP_CONFIG.feedProxyUrl || DEFAULT_FEED_PROXY_URL);
}

function buildSleepSafeAudioUrl(sourceUrl, proxyUrl, profile = 'sleep-safe') {
  const trimmedSource = (sourceUrl || '').trim();
  const trimmedProxy = (proxyUrl || '').trim();
  if (!trimmedSource || !trimmedProxy) return trimmedSource;
  try {
    const next = new URL(trimmedProxy, window.location.href);
    if (!next.pathname || next.pathname === '/') next.pathname = '/audio';
    next.searchParams.set('url', trimmedSource);
    next.searchParams.set('profile', profile);
    return next.toString();
  } catch {
    return trimmedSource;
  }
}

function parseDuration(raw) {
  if (!raw) return '';
  const t = raw.trim();
  let totalSeconds = NaN;
  if (/^\d+$/.test(t)) {
    totalSeconds = parseInt(t, 10);
  } else {
    const parts = t.split(':').map(part => Number(part));
    if (parts.length >= 2 && parts.every(Number.isFinite)) {
      totalSeconds = parts.reduce((sum, part) => (sum * 60) + part, 0);
    }
  }
  if (!Number.isFinite(totalSeconds) || totalSeconds <= 0) return '';
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return s > 0 ? `${m}m ${s}s` : `${m}m`;
  return `${s}s`;
}

function fmtTime(s) {
  if (!s || !isFinite(s) || s < 0) return '0:00';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function previewText(text, maxLength = 140) {
  const normalized = (text || '').replace(/\s+/g, ' ').trim();
  if (!normalized) return '';
  return normalized.length > maxLength ? `${normalized.slice(0, maxLength - 3)}...` : normalized;
}

function readStoredArray(key) {
  try {
    const parsed = JSON.parse(localStorage.getItem(key) || '[]');
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function deriveFeedName(rawUrl) {
  const trimmed = (rawUrl || '').trim();
  if (!trimmed) return 'Saved Feed';
  try {
    return new URL(trimmed, window.location.href).hostname.replace(/^www\./, '') || 'Saved Feed';
  } catch {
    return trimmed.replace(/^https?:\/\//, '').split('/')[0] || 'Saved Feed';
  }
}

function inferPodcastTitle(episodeTitle) {
  const match = (episodeTitle || '').match(/^\[([^\]]+)\]\s*/);
  return match?.[1]?.trim() || '';
}

function dedupeEpisodes(episodes) {
  const seen = new Set();
  return episodes.filter(episode => {
    const key = episode?.id || episode?.url;
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function describeError(error) {
  if (!error) return '';
  if (typeof error === 'string') return error;
  const parts = [];
  if (error.code) parts.push(error.code);
  if (error.name && error.name !== 'Error' && error.name !== error.code) parts.push(error.name);
  if (error.message && error.message !== error.code) parts.push(error.message);
  return parts.join(': ') || 'Request failed.';
}

function mergeHeaders(...headerSets) {
  const merged = new Headers();
  headerSets.filter(Boolean).forEach(headerSet => {
    new Headers(headerSet).forEach((value, key) => merged.set(key, value));
  });
  return merged;
}

function withFeedHeaders(init = {}) {
  return {
    ...init,
    headers: mergeHeaders({ Accept: FEED_ACCEPT_HEADER }, init.headers),
  };
}

function fetchWithTimeout(input, init = {}, timeoutMs = FEED_TIMEOUT_MS) {
  if (typeof AbortController === 'undefined') return fetch(input, init);
  const controller = new AbortController();
  const timer = window.setTimeout(() => controller.abort(), timeoutMs);
  return fetch(input, { ...init, signal: controller.signal }).finally(() => {
    window.clearTimeout(timer);
  });
}

function safeJsonParse(text) {
  try { return JSON.parse(text); }
  catch { return null; }
}

function localNameOf(node) {
  return (node?.localName || node?.nodeName || '').replace(/^.*:/, '').toLowerCase();
}

function directElements(node) {
  return Array.from(node?.children || []);
}

function directMatches(node, names) {
  const wanted = new Set(names.map(v => v.toLowerCase()));
  return directElements(node).filter(child => wanted.has(localNameOf(child)));
}

function descendantMatches(node, names) {
  const wanted = new Set(names.map(v => v.toLowerCase()));
  return Array.from(node?.getElementsByTagName?.('*') || []).filter(child => wanted.has(localNameOf(child)));
}

function firstDirectText(node, names) {
  for (const child of directMatches(node, names)) {
    const text = child.textContent?.trim();
    if (text) return text;
  }
  return '';
}

function firstDescendantText(node, names) {
  return firstDirectText(node, names) || descendantMatches(node, names).map(el => el.textContent?.trim()).find(Boolean) || '';
}

function firstAttrFromElements(elements, attrs, predicate = () => true) {
  for (const element of elements) {
    if (!predicate(element)) continue;
    for (const attr of attrs) {
      const value = element.getAttribute?.(attr)?.trim();
      if (value) return value;
    }
  }
  return '';
}

function firstText(root, selectors) {
  for (const selector of selectors) {
    const value = root.querySelector(selector)?.textContent?.trim();
    if (value) return value;
  }
  return '';
}

function firstAttr(root, selectorPairs) {
  for (const [selector, attr] of selectorPairs) {
    const value = root.querySelector(selector)?.getAttribute(attr)?.trim();
    if (value) return value;
  }
  return '';
}

function resolveMaybeUrl(value, baseUrl) {
  if (!value) return '';
  try { return new URL(value, baseUrl).href; }
  catch { return value; }
}

function sniffMarkupType(raw) {
  const text = (raw || '')
    .replace(/^\uFEFF/, '')
    .trimStart()
    .replace(/^(?:<!--[\s\S]*?-->\s*)+/, '');
  if (!text) return 'empty';
  if (/^<(?:\?xml\b|rss\b|feed\b|rdf:RDF\b)/i.test(text)) return 'xml';
  if (/^<(?:!doctype\s+html\b|html\b)/i.test(text)) return 'html';
  return 'unknown';
}

function looksLikeXmlFeed(raw) {
  if (sniffMarkupType(raw) !== 'xml') return false;
  const xml = new DOMParser().parseFromString(raw, 'text/xml');
  if (xml.querySelector('parsererror')) return false;
  const root = xml.documentElement;
  if (!root) return false;
  const rootName = localNameOf(root);
  return ['rss', 'feed', 'rdf'].includes(rootName) || !!descendantMatches(root, ['item', 'entry']).length;
}

function extractEmbeddedFeedMarkup(raw) {
  if (sniffMarkupType(raw) !== 'html') return '';
  const html = new DOMParser().parseFromString(raw, 'text/html');
  const body = html.body;
  const candidates = [
    ...(Array.from(html.querySelectorAll('pre, code, textarea')).map(node => node.textContent || '')),
    body?.textContent || '',
    body?.innerText || '',
  ];
  for (const candidate of candidates) {
    if (looksLikeXmlFeed(candidate)) return candidate.trim();
  }
  const bodyMarkup = body?.innerHTML || '';
  const inlineMarkup = bodyMarkup.match(/<(?:\?xml\b|rss\b|feed\b|rdf:RDF\b)[\s\S]*$/i)?.[0] || '';
  if (looksLikeXmlFeed(inlineMarkup)) return inlineMarkup.trim();
  return '';
}

function discoverAlternateFeedUrl(raw, baseUrl) {
  if (sniffMarkupType(raw) !== 'html') return '';
  const html = new DOMParser().parseFromString(raw, 'text/html');
  const alternate = Array.from(html.querySelectorAll('link[rel~="alternate"][href]')).find(link => {
    const type = (link.getAttribute('type') || '').toLowerCase();
    return /rss|atom|xml/.test(type);
  })?.getAttribute('href');
  if (alternate) return resolveMaybeUrl(alternate, baseUrl);

  const candidate = Array.from(html.querySelectorAll('a[href]')).find(link => {
    const href = (link.getAttribute('href') || '').toLowerCase();
    return /(?:rss|feed|atom|xml)/.test(href);
  })?.getAttribute('href');
  return resolveMaybeUrl(candidate, baseUrl);
}

function normalizeFeedUrl(input) {
  const trimmed = (input || '').trim();
  const normalized = { originalUrl: trimmed, fetchUrl: trimmed, authHeader: '' };
  try {
    const parsed = new URL(trimmed);
    if (parsed.username || parsed.password) {
      const user = decodeURIComponent(parsed.username);
      const pass = decodeURIComponent(parsed.password);
      normalized.authHeader = `Basic ${btoa(`${user}:${pass}`)}`;
      parsed.username = '';
      parsed.password = '';
      normalized.fetchUrl = parsed.toString();
    }
  } catch {}
  return normalized;
}

function buildFeedSources(feedUrl, options = {}) {
  const proxyUrl = normalizeConfigUrl(options.proxyUrl);
  const authHeader = options.authHeader || '';
  const sources = [];

  if (proxyUrl) {
    sources.push({
      label: 'Private Proxy',
      url: proxyUrl,
      init: withFeedHeaders({
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: feedUrl, authHeader }),
      }),
      read: text => text,
    });
  }

  sources.push(
    {
      label: 'Direct',
      url: feedUrl,
      init: withFeedHeaders(authHeader ? { headers: { Authorization: authHeader } } : {}),
      read: text => text,
    },
    {
      label: 'AllOrigins',
      url: `https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`,
      init: withFeedHeaders(),
      read: text => {
        const parsed = safeJsonParse(text);
        return parsed?.contents || parsed?.data || '';
      }
    },
    {
      label: 'CORS Proxy',
      url: `https://corsproxy.io/?${encodeURIComponent(feedUrl)}`,
      init: withFeedHeaders(),
      read: text => text,
    }
  );

  return sources;
}

function makeFeedError(code, details = {}) {
  const error = new Error(code);
  error.code = code;
  Object.assign(error, details);
  return error;
}

function formatFeedError(error, fallbackUrl) {
  if (!error) return 'Feed unavailable. Check URL or try again.';
  if (error.code === 'html-auth') {
    return 'This URL returned a login or web page instead of a feed. Private feeds often block browser/proxy access.';
  }
  if (error.code === 'alternate-feed' && error.alternateUrl) {
    return `This URL looks like a webpage, not a feed. Try the discovered feed URL: ${error.alternateUrl}`;
  }
  if (error.code === 'empty-feed') {
    return 'The feed loaded, but no episodes with playable audio were found.';
  }
  if (error.code === 'auth-cors') {
    return 'This private feed likely needs auth or blocks browser access. If it uses username/password, the host must allow direct browser requests.';
  }
  if (error.code === 'network') {
    return error.hasProxy
      ? 'No feed route succeeded, including your private proxy. Open Feed Debug for the failing step.'
      : 'The browser could not read this feed directly. Member-only feeds usually need a private proxy URL.';
  }
  if (error.code === 'timeout') {
    return 'The feed request timed out before any source returned XML.';
  }
  if (error.code === 'parsererror') {
    return 'The response was not valid RSS/Atom XML.';
  }
  const details = describeError(error);
  return details || `Could not load this feed from ${fallbackUrl}.`;
}

function parseFeedEpisodes(raw, feedUrl) {
  const embeddedFeed = extractEmbeddedFeedMarkup(raw);
  const source = embeddedFeed || raw;
  const markupType = sniffMarkupType(source);
  if (markupType === 'html') {
    const alternateUrl = discoverAlternateFeedUrl(source, feedUrl);
    if (alternateUrl && alternateUrl !== feedUrl) throw makeFeedError('alternate-feed', { alternateUrl });
    throw makeFeedError('html-auth');
  }
  const xml = new DOMParser().parseFromString(source, 'text/xml');
  if (xml.querySelector('parsererror')) throw makeFeedError('parsererror');

  const root = xml.documentElement;
  const container = directMatches(root, ['channel', 'feed'])[0] || root;
  const fallbackTitle = deriveFeedName(feedUrl) || 'Podcast';
  const podcastTitle = firstDirectText(container, ['title']) || firstDescendantText(container, ['title']) || fallbackTitle;

  const items = directMatches(container, ['item', 'entry']);
  const itemNodes = items.length ? items : descendantMatches(container, ['item', 'entry']);
  const episodes = dedupeEpisodes(itemNodes.map(item => {
    const title = firstDirectText(item, ['title']) || firstDescendantText(item, ['title']) || 'Untitled';
    const directAudio = firstAttrFromElements(directMatches(item, ['enclosure']), ['url']);
    const mediaAudio = firstAttrFromElements(descendantMatches(item, ['content']), ['url', 'href', 'src'], el => {
      const type = (el.getAttribute('type') || '').toLowerCase();
      return !type || type.startsWith('audio/');
    });
    const linkAudio = firstAttrFromElements(descendantMatches(item, ['link']), ['href', 'url'], el => {
      const rel = (el.getAttribute('rel') || '').toLowerCase();
      const type = (el.getAttribute('type') || '').toLowerCase();
      const href = (el.getAttribute('href') || '').toLowerCase();
      return rel === 'enclosure' || type.startsWith('audio/') || /\.(mp3|m4a|aac|mp4|m4b)([?#].*)?$/.test(href);
    });
    const audioUrl = resolveMaybeUrl(directAudio || mediaAudio || linkAudio, feedUrl);

    if (!audioUrl) return null;
    const rawDuration = firstDirectText(item, ['duration']) || firstDescendantText(item, ['duration']) || '';
    const duration = parseDuration(rawDuration);
    const rawDesc = firstDirectText(item, ['description','summary']) || firstDescendantText(item, ['description','summary']) || '';
    const description = previewText(rawDesc.replace(/<[^>]+>/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/\s+/g,' ').trim(), 240);
    return {
      id: hashUrl(audioUrl),
      title: `[${podcastTitle}] ${title}`,
      url: audioUrl,
      duration,
      description,
    };
  }).filter(Boolean));
  if (!episodes.length) throw makeFeedError('empty-feed');
  return {
    feedTitle: podcastTitle,
    episodes,
  };
}

function isIOSDevice() {
  const ua = navigator.userAgent || '';
  return /iP(hone|ad|od)/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function isStandaloneWebApp() {
  return window.matchMedia?.('(display-mode: standalone)')?.matches || window.navigator.standalone === true;
}

// ─── Noise generators (all use sr param — no hardcoded 44100) ─────────────────
function generateBrown(L, R, n) {
  let lL=0,lR=0;
  for (let i=0;i<n;i++) { const wL=Math.random()*2-1,wR=Math.random()*2-1; lL=(lL+.02*wL)/1.02; lR=(lR+.02*wR)/1.02; L[i]=lL*3.5; R[i]=lR*3.5; }
}
function generatePink(L, R, n) {
  let b0L=0,b1L=0,b2L=0,b3L=0,b4L=0,b5L=0,b6L=0,b0R=0,b1R=0,b2R=0,b3R=0,b4R=0,b5R=0,b6R=0;
  for (let i=0;i<n;i++) {
    const wL=Math.random()*2-1,wR=Math.random()*2-1;
    b0L=.99886*b0L+wL*.0555179;b1L=.99332*b1L+wL*.0750759;b2L=.969*b2L+wL*.153852;b3L=.8665*b3L+wL*.310486;b4L=.55*b4L+wL*.532952;b5L=-.7616*b5L-wL*.016898;
    L[i]=(b0L+b1L+b2L+b3L+b4L+b5L+b6L+wL*.5362)*.11;b6L=wL*.115926;
    b0R=.99886*b0R+wR*.0555179;b1R=.99332*b1R+wR*.0750759;b2R=.969*b2R+wR*.153852;b3R=.8665*b3R+wR*.310486;b4R=.55*b4R+wR*.532952;b5R=-.7616*b5R-wR*.016898;
    R[i]=(b0R+b1R+b2R+b3R+b4R+b5R+b6R+wR*.5362)*.11;b6R=wR*.115926;
  }
}
function generateGreen(L, R, n) {
  let g0L=0,g1L=0,g0R=0,g1R=0;
  for (let i=0;i<n;i++) { const wL=Math.random()*2-1,wR=Math.random()*2-1; g0L=.994*g0L+wL*.05;g1L=.9*g1L+wL*.05;L[i]=(g0L-g1L)*3;g0R=.994*g0R+wR*.05;g1R=.9*g1R+wR*.05;R[i]=(g0R-g1R)*3; }
}
function generateWhite(L, R, n) {
  for (let i=0;i<n;i++) { L[i]=(Math.random()*2-1)*.5;R[i]=(Math.random()*2-1)*.5; }
}
function generateFan(L, R, n, sr) {
  let lL=0,lR=0;
  for (let i=0;i<n;i++) {
    const wL=Math.random()*2-1,wR=Math.random()*2-1;
    lL=(lL+.015*wL)/1.015;lR=(lR+.015*wR)/1.015;
    const hum=Math.sin(2*Math.PI*60*i/sr)*.15;
    L[i]=lL*4.5+hum;R[i]=lR*4.5+hum;
  }
}
function generateRain(L, R, n) {
  let b0L=0,b1L=0,b0R=0,b1R=0;
  for (let i=0;i<n;i++) {
    const wL=Math.random()*2-1,wR=Math.random()*2-1;
    b0L=.8*b0L+wL*.12;L[i]=(wL*.7+b0L*.2+b1L*.1)*.75;b1L=wL;
    b0R=.8*b0R+wR*.12;R[i]=(wR*.7+b0R*.2+b1R*.1)*.75;b1R=wR;
  }
}
function generateOcean(L, R, n, sr) {
  let lL=0,lR=0;
  for (let i=0;i<n;i++) {
    const wL=Math.random()*2-1,wR=Math.random()*2-1;
    lL=(lL+.022*wL)/1.022;lR=(lR+.022*wR)/1.022;
    const lfo=Math.pow((Math.sin(2*Math.PI*.10*i/sr)+1)/2,1.8);
    L[i]=lL*4.5*lfo;R[i]=lR*4.5*lfo;
  }
}
function generateForest(L, R, n, sr) {
  let b0L=0,b1L=0,b0R=0,b1R=0,phase=0;
  for (let i=0;i<n;i++) {
    const wL=Math.random()*2-1,wR=Math.random()*2-1;
    b0L=.88*b0L+wL*.2;L[i]=(wL*.5-b0L*.5+b1L*.22)*.85;b1L=wL;
    b0R=.88*b0R+wR*.2;R[i]=(wR*.5-b0R*.5+b1R*.22)*.85;b1R=wR;
    phase+=2*Math.PI*4.2*(1+(Math.random()-.5)*.15)/sr;
    if(phase>2*Math.PI)phase-=2*Math.PI;
    const e=.35+.65*Math.abs(Math.sin(phase));
    L[i]*=e;R[i]*=e;
  }
}

  brown:  { label:'🌊 Brown (Deep Waterfall)',  fn: (L,R,n,sr)=>generateBrown(L,R,n)  },
  pink:   { label:'🌧 Pink (Steady Rain)',       fn: (L,R,n,sr)=>generatePink(L,R,n)   },
  green:  { label:'💧 Green (Rushing River)',    fn: (L,R,n,sr)=>generateGreen(L,R,n)  },
  white:  { label:'📻 White (Classic Static)',   fn: (L,R,n,sr)=>generateWhite(L,R,n)  },
  fan:    { label:'🌀 Fan (Box Fan Hum)',         fn: generateFan  },
  rain:   { label:'☔ Rain (Gentle Shower)',      fn: (L,R,n,sr)=>generateRain(L,R,n)   },
  ocean:  { label:'🌊 Ocean (Rolling Waves)',     fn: generateOcean },
  forest: { label:'🌲 Forest (Night Crickets)',   fn: generateForest},

const BINAURAL = {
  delta: { name:'Deep Sleep (4 Hz)',  beat:4,  carrier:180 },
  theta: { name:'Meditation (6 Hz)', beat:6,  carrier:200 },
  alpha: { name:'Relaxation (10 Hz)',beat:10, carrier:220 },
};

const ARTWORK = [{ src:'icon-512.png', sizes:'512x512', type:'image/png' }];
const LOOP_SAMPLE_RATE = 12000;
const BINAURAL_LOOP_SAMPLE_RATE = 4000;
const AMBIENT_LOOP_SECONDS = 60;
// iOS media-element looping is not reliably gapless, so keep this much longer.
const BINAURAL_LOOP_SECONDS = 300;
const LOOP_TRANSITION_SECONDS = 1.25;
const LOOP_MATCH_SECONDS = 1.5;
const LOOP_SCALED_GAIN_EPSILON = 0.01;
const LOOP_MUTED_GAIN_EPSILON = 0.001;
const LOOP_SOURCE_TIME_FUZZ = 0.05;
const LOOP_BUFFER_CACHE = {
  ambient: new Map(),
  binaural: new Map(),
};
const LOOP_URL_CACHE = {
  ambient: new Map(),
  binaural: new Map(),
};

function writeAscii(view, offset, text) {
  for (let i = 0; i < text.length; i++) view.setUint8(offset + i, text.charCodeAt(i));
}

function buildStereoWavUrl(left, right, sampleRate, gain = 1) {
  const frames = Math.min(left.length, right.length);
  const bytesPerSample = 2;
  const numChannels = 2;
  const dataSize = frames * numChannels * bytesPerSample;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);
  writeAscii(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeAscii(view, 8, 'WAVE');
  writeAscii(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
  view.setUint16(32, numChannels * bytesPerSample, true);
  view.setUint16(34, bytesPerSample * 8, true);
  writeAscii(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < frames; i++) {
    const l = Math.max(-1, Math.min(1, (left[i] || 0) * gain));
    const r = Math.max(-1, Math.min(1, (right[i] || 0) * gain));
    view.setInt16(offset, l < 0 ? l * 0x8000 : l * 0x7fff, true);
    view.setInt16(offset + 2, r < 0 ? r * 0x8000 : r * 0x7fff, true);
    offset += 4;
  }
  return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
}

function buildLoopMeta(sampleRate, loopStartFrames, loopWrapStartFrames, totalFrames) {
  return {
    sampleRate,
    loopStartFrames,
    loopWrapStartFrames,
    totalFrames,
    loopStartTime: loopStartFrames / sampleRate,
    loopWrapStartTime: loopWrapStartFrames / sampleRate,
    loopWindowSeconds: Math.max(0, (totalFrames - loopWrapStartFrames) / sampleRate),
  };
}

function maybeWrapManualLoop(audio, loopMeta, wrapLockRef) {
  if (!audio || !loopMeta || !Number.isFinite(audio.currentTime)) return;
  const currentTime = audio.currentTime;
  const wrapStart = loopMeta.loopWrapStartTime;
  if (currentTime < wrapStart - LOOP_SOURCE_TIME_FUZZ) {
    wrapLockRef.current = false;
    return;
  }
  const offset = currentTime - wrapStart;
  if (offset < -LOOP_SOURCE_TIME_FUZZ || offset > loopMeta.loopWindowSeconds + LOOP_SOURCE_TIME_FUZZ) return;
  if (wrapLockRef.current) return;
  wrapLockRef.current = true;
  try {
    audio.currentTime = Math.max(0, loopMeta.loopStartTime + Math.max(0, offset));
  } catch (error) {}
}

function getAmbientLoopBuffer(type) {
  if (LOOP_BUFFER_CACHE.ambient.has(type)) return LOOP_BUFFER_CACHE.ambient.get(type);
  const frames = LOOP_SAMPLE_RATE * AMBIENT_LOOP_SECONDS;
  const rawLeft = new Float32Array(frames);
  const rawRight = new Float32Array(frames);
  NOISE_TYPES[type].fn(rawLeft, rawRight, frames, LOOP_SAMPLE_RATE);

  const left = rawLeft.slice();
  const right = rawRight.slice();
  const transitionFrames = Math.min(
    Math.max(64, Math.round(LOOP_SAMPLE_RATE * LOOP_TRANSITION_SECONDS)),
    Math.max(64, Math.floor(frames / 4))
  );
  const matchFrames = Math.min(
    Math.max(64, Math.round(LOOP_SAMPLE_RATE * LOOP_MATCH_SECONDS)),
    Math.max(64, Math.floor(frames / 4))
  );
  const loopStartFrames = transitionFrames;
  const loopWrapStartFrames = Math.max(loopStartFrames + 1, frames - matchFrames);
  const transitionStart = Math.max(0, loopWrapStartFrames - transitionFrames);

  for (let i = 0; i < transitionFrames; i++) {
    const tailIndex = transitionStart + i;
    if (tailIndex >= loopWrapStartFrames) break;
    const blend = transitionFrames <= 1 ? 1 : i / (transitionFrames - 1);
    left[tailIndex] = rawLeft[tailIndex] * (1 - blend) + rawLeft[i] * blend;
    right[tailIndex] = rawRight[tailIndex] * (1 - blend) + rawRight[i] * blend;
  }
  for (let i = 0; i < matchFrames; i++) {
    const targetIndex = loopWrapStartFrames + i;
    const sourceIndex = loopStartFrames + i;
    if (targetIndex >= frames || sourceIndex >= frames) break;
    left[targetIndex] = rawLeft[sourceIndex];
    right[targetIndex] = rawRight[sourceIndex];
  }

  const buffer = {
    left,
    right,
    sampleRate: LOOP_SAMPLE_RATE,
    loopMeta: buildLoopMeta(LOOP_SAMPLE_RATE, loopStartFrames, loopWrapStartFrames, frames),
  };
  LOOP_BUFFER_CACHE.ambient.set(type, buffer);
  return buffer;
}

function getAmbientLoopMeta(type) {
  return getAmbientLoopBuffer(type).loopMeta;
}

function getAmbientLoopUrl(type, gain = 1) {
  const quantizedGain = clamp01(gain);
  if (Math.abs(quantizedGain - 1) < LOOP_SCALED_GAIN_EPSILON) {
    if (LOOP_URL_CACHE.ambient.has(type)) return LOOP_URL_CACHE.ambient.get(type);
    const { left, right, sampleRate } = getAmbientLoopBuffer(type);
    const url = buildStereoWavUrl(left, right, sampleRate);
    LOOP_URL_CACHE.ambient.set(type, url);
    return url;
  }
  const { left, right, sampleRate } = getAmbientLoopBuffer(type);
  return buildStereoWavUrl(left, right, sampleRate, quantizedGain);
}

function getBinauralLoopBuffer(presetKey) {
  if (LOOP_BUFFER_CACHE.binaural.has(presetKey)) return LOOP_BUFFER_CACHE.binaural.get(presetKey);
  const coreFrames = BINAURAL_LOOP_SAMPLE_RATE * BINAURAL_LOOP_SECONDS;
  const matchFrames = Math.min(
    Math.max(64, Math.round(BINAURAL_LOOP_SAMPLE_RATE * LOOP_MATCH_SECONDS)),
    Math.max(64, Math.floor(coreFrames / 6))
  );
  const frames = coreFrames + matchFrames;
  const left = new Float32Array(frames);
  const right = new Float32Array(frames);
  const { beat, carrier } = BINAURAL[presetKey];
  const leftFreq = carrier - beat / 2;
  const rightFreq = carrier + beat / 2;
  for (let i = 0; i < coreFrames; i++) {
    const t = i / BINAURAL_LOOP_SAMPLE_RATE;
    left[i] = Math.sin(2 * Math.PI * leftFreq * t) * 0.32;
    right[i] = Math.sin(2 * Math.PI * rightFreq * t) * 0.32;
  }
  for (let i = 0; i < matchFrames; i++) {
    left[coreFrames + i] = left[i];
    right[coreFrames + i] = right[i];
  }
  const buffer = {
    left,
    right,
    sampleRate: BINAURAL_LOOP_SAMPLE_RATE,
    loopMeta: buildLoopMeta(BINAURAL_LOOP_SAMPLE_RATE, 0, coreFrames, frames),
  };
  LOOP_BUFFER_CACHE.binaural.set(presetKey, buffer);
  return buffer;
}

function getBinauralLoopMeta(presetKey) {
  return getBinauralLoopBuffer(presetKey).loopMeta;
}

function getBinauralLoopUrl(presetKey, gain = 1) {
  const quantizedGain = clamp01(gain);
  if (Math.abs(quantizedGain - 1) < LOOP_SCALED_GAIN_EPSILON) {
    if (LOOP_URL_CACHE.binaural.has(presetKey)) return LOOP_URL_CACHE.binaural.get(presetKey);
    const { left, right, sampleRate } = getBinauralLoopBuffer(presetKey);
    const url = buildStereoWavUrl(left, right, sampleRate);
    LOOP_URL_CACHE.binaural.set(presetKey, url);
    return url;
  }
  const { left, right, sampleRate } = getBinauralLoopBuffer(presetKey);
  return buildStereoWavUrl(left, right, sampleRate, quantizedGain);
}

function configureHiddenAudioElement(audio) {
  audio.playsInline = true;
  audio.loop = true;
  audio.preload = 'auto';
  audio.setAttribute('playsinline', '');
  audio.setAttribute('webkit-playsinline', '');
  audio.setAttribute('x-webkit-airplay', 'deny');
  if ('disableRemotePlayback' in audio) audio.disableRemotePlayback = true;
  Object.assign(audio.style, {
    position: 'fixed',
    width: '1px',
    height: '1px',
    bottom: '0',
    left: '0',
    opacity: '0.001',
    pointerEvents: 'none',
  });
}

  const setNativeAudioLevel = useCallback((audio, volume, muteState) => {

  const swapManagedLoopSource = useCallback((audio, nextUrl, managedRef, loopDuration, preservePosition = true, managed = false) => {
    if (!audio || !nextUrl) return;
    const currentSrc = audio.currentSrc || audio.src || '';
    const previousManaged = managedRef.current || '';
    if (currentSrc === nextUrl) {
      if (!managed && previousManaged) {
        URL.revokeObjectURL(previousManaged);
        managedRef.current = '';
      }
      return;
    }

    const wasPlaying = !audio.paused;
    const previousTime = preservePosition && Number.isFinite(audio.currentTime) ? audio.currentTime : 0;
    const resumeAt = loopDuration ? previousTime % loopDuration : previousTime;
    if (wasPlaying) audio.pause();
    audio.src = nextUrl;
    audio.load();
    if ((wasPlaying || resumeAt > LOOP_SOURCE_TIME_FUZZ) && (preservePosition || wasPlaying)) {
      const restore = () => {
        if (resumeAt > LOOP_SOURCE_TIME_FUZZ) {
          try { audio.currentTime = resumeAt; } catch(e){}

  const syncPodVolume = useCallback((scale = 1, muteState = muted) => {

        const nextUrl = managed && ambientSourceKey.current === sourceKey && ambientManagedUrl.current

        ambientSourceKey.current = sourceKey;
      }

      if (ambientOn && !audio.muted && audio.paused && gain > LOOP_MUTED_GAIN_EPSILON) {
        audio.play().catch(()=>{});

    swapManagedLoopSource(audio, getAmbientLoopUrl(noiseType), ambientManagedUrl, AMBIENT_LOOP_SECONDS, preservePosition, false);

      if (binOn && !audio.muted && audio.paused && gain > LOOP_MUTED_GAIN_EPSILON) {

    swapManagedLoopSource(audio, getBinauralLoopUrl(binPreset), binManagedUrl, BINAURAL_LOOP_SECONDS, preservePosition, false);
    binSourceKey.current = baseSourceKey;
    setNativeAudioLevel(audio, gain, muteState);
    if (binOn && !audio.muted && audio.paused && gain > LOOP_MUTED_GAIN_EPSILON) {

  const setPlaybackAudioSession = useCallback(() => {

        playbackRate: audio.playbackRate || 1,

  }, []);
  const resumeSoundscapeAudio = useCallback(() => {
    if (ambientOn) {
      syncAmbientVolume(1, false);
      ambientAudio.current?.play().catch(()=>{});
    }
    if (binOn) {
      syncBinVolume(1, false);
      binAudio.current?.play().catch(()=>{});
    }
  }, [ambientOn, binOn, syncAmbientVolume, syncBinVolume]);
  const pauseSoundscapeAudio = useCallback(() => {
    ambientAudio.current?.pause();
    binAudio.current?.pause();
  }, []);

  useEffect(()=>{
    podStateRef.current = { autoPlay, shuffle, playingSrc, episodes, playlist, curEp };
  },[autoPlay, shuffle, playingSrc, episodes, playlist, curEp]);

  // ── Persist settings ──────────────────────────────────────────────────────
  useEffect(()=>{
    try {
      localStorage.setItem('masterVolume',            masterVol);
      localStorage.setItem('brownVolume',             ambientVol);
      localStorage.setItem('noiseType',               noiseType);
      localStorage.setItem('ambientBypass',           ambientBypass);
      localStorage.setItem('binauralVolume',          binVol);
      localStorage.setItem('binauralPreset',          binPreset);
      localStorage.setItem('binauralBypass',          binBypass);
      localStorage.setItem('podcastVolume',           podVol);
      localStorage.setItem('playbackSpeed',           podSpeed);
      localStorage.setItem('autoPlayEnabled',         autoPlay);
      localStorage.setItem('shuffleEnabled',          shuffle);
      localStorage.setItem('timerMinutes',            timerMins);
      localStorage.setItem('rssUrl',                  rssUrl);
      localStorage.setItem('feedProxyUrl',            feedProxyUrl);
      localStorage.setItem('audioProxyUrl',           audioProxyUrl);
      localStorage.setItem('sleepSafeAudioEnabled',   sleepSafeAudio);
      localStorage.setItem('showFeedDebug',           showFeedDebug);
      localStorage.setItem('sleepulatorPlaylist',     JSON.stringify(playlist));
      localStorage.setItem('feedSubs',                JSON.stringify(subs));

  },[masterVol,ambientVol,noiseType,ambientBypass,binVol,binPreset,binBypass,
     podVol,podSpeed,autoPlay,shuffle,
     timerMins,rssUrl,feedProxyUrl,audioProxyUrl,sleepSafeAudio,showFeedDebug,playlist,subs,savedPlaylists]);

  // ── Service Worker ────────────────────────────────────────────────────────
  useEffect(()=>{
    if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
    const show=()=>document.getElementById('offline-banner').style.display='block';
    const hide=()=>document.getElementById('offline-banner').style.display='none';
    window.addEventListener('offline',show); window.addEventListener('online',hide);
    return ()=>{ window.removeEventListener('offline',show); window.removeEventListener('online',hide); };
  },[]);

  // ── Bedtime mode class on root ────────────────────────────────────────────
  useEffect(()=>{
    document.documentElement.classList.toggle('bm', bm);
  },[bm]);

  // ── Wake Lock (keeps screen awake while audio plays) ─────────────────────
  const anyPlaying = ambientOn || binOn || podPlaying;

      setPlaybackAudioSession();

    } else {
      wakeLock.current?.release().catch(()=>{});
      wakeLock.current = null;
    }
    return ()=>{ wakeLock.current?.release().catch(()=>{}); };
  },[anyPlaying, muted, setPlaybackAudioSession]);

        try { wakeLock.current = await navigator.wakeLock.request('screen'); } catch(e){}
      }

  // ── 3. Podcast ────────────────────────────────────────────────────────────
  const upsertFeedSub = nextSub => {

      const index = prev.findIndex(entry => entry.url === normalizedUrl);
      const existing = index >= 0 ? prev[index] : null;
      const entry = {
        ...existing,
        ...nextSub,
        url: normalizedUrl,
        name: (nextSub?.name || '').trim() || existing?.name || deriveFeedName(normalizedUrl),
        updatedAt: new Date().toISOString(),
      };
      if (index >= 0) {
        const next = [...prev];
        next[index] = entry;
        return next;
      }
      return [entry, ...prev];
    });
  };

    const additions = Array.isArray(nextEpisodes) ? nextEpisodes.filter(Boolean) : [];

    setPlaylist(prev => {
      const existingIds = new Set(prev.map(ep => ep.id));
      const uniqueAdditions = additions.filter(ep => ep?.id && !existingIds.has(ep.id));
      return uniqueAdditions.length ? [...prev, ...uniqueAdditions] : prev;
    });
  };

    const fromFeed = subName.trim() || inferPodcastTitle(playlist[0]?.title) || inferPodcastTitle(episodes[0]?.title);
    const base = fromLibrary || fromFeed;

    return `Playlist ${new Date().toLocaleDateString(undefined, { month:'short', day:'numeric' })}`;
  };

      const existingIndex = prev.findIndex(entry => entry.name.toLowerCase() === name.toLowerCase());

        id: existingIndex >= 0 ? prev[existingIndex].id : `playlist-${Date.now()}`,
        name,
        episodes: playlist,
        count: playlist.length,
        updatedAt: new Date().toISOString(),
      };
      if (existingIndex >= 0) {
        const next = [...prev];
        next[existingIndex] = nextEntry;
        return next;
      }
      return [nextEntry, ...prev];
    });

  };

    if (!savedEpisodes.length) return;

    setPlaylistName(savedPlaylist?.name || '');
