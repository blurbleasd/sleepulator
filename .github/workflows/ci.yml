name: iOS CI

# Build + unit-test the native app on every PR and push to main. Replaces the dead
# "Deploy to GitHub Pages" workflow (a vestige of the archived Vite PWA).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      # Device names drift across Xcode versions, so resolve an available iPhone
      # simulator UDID instead of hardcoding a name (a wrong name = "destination not found").
      - name: Pick an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)["devices"]
          pick = ""
          for runtime, devices in sorted(data.items()):
              if "iOS" not in runtime:
                  continue
              for dev in devices:
                  if dev.get("isAvailable") and dev["name"].startswith("iPhone"):
                      pick = dev["udid"]   # newest sorted runtime wins
          print(pick)
          ')
          if [ -z "$UDID" ]; then echo "::error::No iOS simulator available"; xcrun simctl list devices; exit 1; fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator $UDID"

      # Boot first: a cold simulator makes `xcodebuild test` fail with
      # "the test runner hung before establishing connection".
      - name: Boot simulator
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b || true

      # `test` still BUILDS the whole app + widget + all test classes (the real compile gate, incl.
      # Metal shaders), but only RUNS the deterministic, non-CoreAudio classes. Tests that construct
      # a live AudioEngine / AVAudioSession (AudioEngineBehaviorTests, NoiseLayeringTests,
      # FirstRunDefaultMixTests, AudioStateTests, the SleepTimer* classes) crash on a headless CI
      # simulator and are covered by the real-device gate (CLAUDE.md). Add new pure classes here.
      - name: Build & test (pure/logic suites)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Sleepulator/Sleepulator.xcodeproj \
            -scheme Sleepulator \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            -only-testing:SleepulatorTests/AudioMathTests \
            -only-testing:SleepulatorTests/AdaptiveRewindTests \
            -only-testing:SleepulatorTests/NoiseMigrationTests \
            -only-testing:SleepulatorTests/PodcastParserTests \
            -only-testing:SleepulatorTests/StorageManagerTests \
            -only-testing:SleepulatorTests/NetRetryTests \
            -only-testing:SleepulatorTests/CacheEvictionTests \
            -only-testing:SleepulatorTests/ModelIdentityTests \
            -only-testing:SleepulatorTests/OPMLParserTests \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
